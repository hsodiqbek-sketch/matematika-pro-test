<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Matematika Pro - Test Markazi</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background: #eef2f3; margin: 0; padding: 20px; }
        .quiz-card { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .q-text { font-size: 20px; margin-bottom: 20px; color: #2c3e50; font-weight: bold; }
        .option-btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; text-align: left; transition: 0.3s; }
        .option-btn:hover { background: #3498db; color: white; }
        .timer { float: right; color: #e74c3c; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

<div class="quiz-card">
    <div class="timer" id="timer">60:00</div>
    <div id="quiz-box">
        <h2 id="cat-name">Yuklanmoqda...</h2>
        <div class="q-text" id="question">Savol yuklanishini kuting...</div>
        <div id="options"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA92S-4QQbvPrNcdpxzzJg-...", 
        authDomain: "matematika-7e82f.firebaseapp.com",
        databaseURL: "https://matematika-7e82f-default-rtdb.firebaseio.com",
        projectId: "matematika-7e82f",
        appId: "1:951023279739:web:481c18388c..."
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentQ = 0;
    let questions = [];

    // Bazadan testni olish (Masalan: SAT, Variant 1)
    function loadTest(cat, vr) {
        db.ref('tests/' + cat + '/variant_' + vr + '/questions').once('value', (snapshot) => {
            questions = snapshot.val();
            showQuestion();
        });
    }

    function showQuestion() {
        if(currentQ < questions.length) {
            let q = questions[currentQ];
            document.getElementById('question').innerText = q.q;
            let optHTML = "";
            q.options.forEach(o => {
                optHTML += `<button class="option-btn" onclick="check('${o}')">${o}</button>`;
            });
            document.getElementById('options').innerHTML = optHTML;
        } else {
            alert("Test tugadi! Natijangiz hisoblanmoqda...");
        }
    }

    // Hozircha SAT Variant 1 ni yuklaymiz
    loadTest('sat', 1);
</script>
</body>
</html>
