<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>USTOZ SOVRINI – MATH QUIZ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .quiz-container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .question { font-size: 18px; font-weight: bold; margin: 20px 0; text-align: left; padding: 10px; border-left: 4px solid #1a73e8; }
        .opt { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; text-align: left; background: #fff; }
        #quiz-content, #timer { display: none; }
        #timer { color: red; font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        img { max-width: 100%; border-radius: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="quiz-container">
        <h1>🏆 USTOZ SOVRINI</h1>
        <div id="auth-box">
            <input type="text" id="userName" placeholder="Ism va familiyangiz" style="width:80%; padding:10px; margin-bottom:10px;">
            <br><button onclick="startQuiz()" style="padding:10px 20px; background:#1a73e8; color:white; border:none; border-radius:5px;">Boshlash</button>
        </div>

        <div id="quiz-content">
            <div id="timer">Vaqt: 60:00</div>
            <div id="quiz-box">Yuklanmoqda...</div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://matematika-7e82f-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentUserName = "", score = 0, timeLeft = 3600;

        function startQuiz() {
            const name = document.getElementById("userName").value;
            if (name.length < 5) return alert("Ism-familiyangizni yozing!");
            currentUserName = name;
            document.getElementById("auth-box").style.display = "none";
            document.getElementById("quiz-content").style.display = "block";
            document.getElementById("timer").style.display = "block";
            startTimer();
            loadQuestions();
        }

        function startTimer() {
            const timerEl = document.getElementById("timer");
            const interval = setInterval(() => {
                let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
                timerEl.innerText = `Vaqt: ${m}:${s < 10 ? '0'+s : s}`;
                if (timeLeft <= 0) { clearInterval(interval); alert("Vaqt tugadi!"); location.reload(); }
                timeLeft--;
            }, 1000);
        }

        function loadQuestions() {
            db.ref("tests/Variant 1").on("value", (snap) => {
                const data = snap.val();
                const box = document.getElementById("quiz-box");
                if (data) {
                    box.innerHTML = "";
                    Object.values(data).forEach((q, i) => {
                        let html = `<div class="question">${i+1}. ${q.question}</div>`;
                        if(q.image) html += `<img src="${q.image}">`;
                        q.options.split(',').forEach(opt => {
                            html += `<button class="opt" onclick="check(this, '${opt.trim()}', '${q.answer}')">${opt.trim()}</button>`;
                        });
                        box.innerHTML += html;
                    });
                }
            });
        }

        function check(btn, userAns, correctAns) {
            btn.parentElement.querySelectorAll('button').forEach(b => b.disabled = true);
            if(userAns === correctAns) { btn.style.background = "#d4edda"; score++; }
            else btn.style.background = "#f8d7da";
            db.ref("results/" + currentUserName.replace(/\s+/g, '_')).set({ ism: currentUserName, ball: score, vaqt: new Date().toLocaleString() });
        }
    </script>
</body>
</html>
