<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USTOZ SOVRINI – MATH QUIZ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; text-align: center; padding: 15px; margin: 0; }
        .quiz-container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .question { font-size: 18px; font-weight: bold; margin: 20px 0; text-align: left; padding: 10px; border-left: 5px solid #1a73e8; background: #f8f9fa; }
        .opt { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; text-align: left; background: #fff; font-size: 16px; transition: 0.3s; }
        .opt:hover { background: #e8f0fe; }
        img { max-width: 100%; border-radius: 10px; margin: 10px 0; border: 1px solid #eee; display: block; margin-left: auto; margin-right: auto; }
        #quiz-content, #timer { display: none; }
        #timer { color: #d93025; font-size: 22px; font-weight: bold; margin-bottom: 15px; }
        input#userName { width: 90%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        button#startBtn { padding: 12px 30px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="quiz-container">
        <h1>🏆 USTOZ SOVRINI</h1>
        <div id="auth-box">
            <input type="text" id="userName" placeholder="Ism va familiyangiz">
            <br>
            <button id="startBtn" onclick="startQuiz()">Boshlash</button>
        </div>

        <div id="quiz-content">
            <div id="timer">Vaqt: 60:00</div>
            <hr>
            <div id="quiz-box">Yuklanmoqda...</div>
        </div>
    </div>

    <script>
        // DIQQAT: Manzil to'liq kiritildi
        const firebaseConfig = {
            databaseURL: "https://matematika-7e82f-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentUserName = "", score = 0, timeLeft = 3600;

        function startQuiz() {
            const name = document.getElementById("userName").value;
            if (name.length < 5) return alert("Iltimos, ism va familiyangizni to'liq yozing!");
            currentUserName = name;
            document.getElementById("auth-box").style.display = "none";
            document.getElementById("quiz-content").style.display = "block";
            document.getElementById("timer").style.display = "block";
            startTimer();
            loadQuestions();
        }

        function startTimer() {
            const interval = setInterval(() => {
                let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
                document.getElementById("timer").innerText = `Vaqt: ${m}:${s < 10 ? '0'+s : s}`;
                if (timeLeft <= 0) { clearInterval(interval); alert("Vaqt tugadi!"); location.reload(); }
                timeLeft--;
            }, 1000);
        }

        function loadQuestions() {
            db.ref("tests/Variant_1").on("value", (snap) => {
                const data = snap.val();
                const box = document.getElementById("quiz-box");
                if (data) {
                    box.innerHTML = "";
                    Object.values(data).forEach((q, i) => {
                        let html = `<div class="question">${i+1}. ${q.question || "Savol"}</div>`;
                        if(q.image) html += `<img src="${q.image}">`;
                        if(q.options) {
                            q.options.split(',').forEach(opt => {
                                html += `<button class="opt" onclick="check(this, '${opt.trim()}', '${q.answer}')">${opt.trim()}</button>`;
                            });
                        }
                        box.innerHTML += html;
                    });
                } else {
                    box.innerHTML = "Hozircha savollar mavjud emas.";
                }
            });
        }

        function check(btn, userAns, correctAns) {
            btn.parentElement.querySelectorAll('button').forEach(b => b.disabled = true);
            if(userAns === correctAns) { 
                btn.style.background = "#d4edda"; 
                btn.style.borderColor = "#28a745";
                score++; 
            } else { 
                btn.style.background = "#f8d7da"; 
                btn.style.borderColor = "#dc3545";
            }
            
            db.ref("results/" + currentUserName.replace(/\s+/g, '_')).set({
                ism: currentUserName,
                ball: score,
                vaqt: new Date().toLocaleString()
            });
        }
    </script>
</body>
</html>
