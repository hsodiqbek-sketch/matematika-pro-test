<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Savollarni Boshqarish</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .q-list { margin-top: 30px; max-width: 600px; margin-left: auto; margin-right: auto; }
        .q-item { background: white; padding: 15px; margin-bottom: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #27ae60; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .delete-btn { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        img.thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; margin-right: 15px; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="card">
    <h3>➕ Yangi Savol Qo'shish</h3>
    <input type="text" id="variant" value="Variant_1" placeholder="Variant nomi">
    <textarea id="questionText" placeholder="Savol matni (masalan: 1-savol)"></textarea>
    <input type="text" id="imgUrl" placeholder="ImgBB dan Direct Link">
    <input type="text" id="options" placeholder="Variantlar (A, B, C, D)">
    <input type="text" id="correct" placeholder="To'g'ri javob (masalan: A)">
    <button onclick="saveToFirebase()">Bazaga Yuborish</button>
</div>

<div class="q-list">
    <h3>📋 Yuklangan Savollar</h3>
    <div id="questionsContainer">Yuklanmoqda... Agar chiqmasa sahifani yangilang.</div>
</div>

<script>
    const firebaseConfig = {
        databaseURL: "https://matematika-7e82f-default-rtdb.europe-west1.firebasedatabase.app/"
    };
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    function saveToFirebase() {
        const variant = document.getElementById('variant').value;
        const data = {
            question: document.getElementById('questionText').value,
            image: document.getElementById('imgUrl').value,
            options: document.getElementById('options').value,
            answer: document.getElementById('correct').value
        };

        if(!data.options || !data.answer) return alert("Hamma maydonni to'ldiring!");

        db.ref("tests/" + variant).push(data).then(() => {
            alert("Muvaffaqiyatli saqlandi!");
            document.getElementById('questionText').value = "";
            document.getElementById('imgUrl').value = "";
            document.getElementById('options').value = "";
            document.getElementById('correct').value = "";
        });
    }

    // SAVOLLARNI O'QISH VA O'CHIRISH TUGMASINI CHIQARISH
    function loadData() {
        const container = document.getElementById("questionsContainer");
        const variant = document.getElementById('variant').value;

        db.ref("tests/" + variant).on("value", (snap) => {
            container.innerHTML = "";
            const data = snap.val();
            
            if (data) {
                Object.keys(data).forEach((id) => {
                    const q = data[id];
                    const item = document.createElement("div");
                    item.className = "q-item";
                    item.innerHTML = `
                        <div style="display:flex; align-items:center;">
                            ${q.image ? `<img src="${q.image}" class="thumb">` : ""}
                            <div>
                                <strong>${q.question || "Savol"}</strong><br>
                                <small>Javob: ${q.answer}</small>
                            </div>
                        </div>
                        <button class="delete-btn" onclick="deleteQ('${id}')">O'chirish</button>
                    `;
                    container.appendChild(item);
                });
            } else {
                container.innerHTML = "Hozircha savollar yo'q.";
            }
        }, (error) => {
            container.innerHTML = "Xato yuz berdi: " + error.message;
        });
    }

    function deleteQ(id) {
        if(confirm("Ushbu savolni o'chirib tashlamoqchimisiz?")) {
            const variant = document.getElementById('variant').value;
            db.ref("tests/" + variant + "/" + id).remove()
              .then(() => alert("O'chirildi!"))
              .catch((err) => alert("Xato: " + err.message));
        }
    }

    // Sahifa yuklanganda ma'lumotlarni chiqarish
    loadData();
</script>

</body>
</html>
