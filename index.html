<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>USTOZ SOVRINI – MATH QUIZ</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; text-align: center; }
        .quiz-container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; text-transform: uppercase; }
        .question { font-size: 22px; margin-bottom: 20px; font-weight: bold; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 15px; font-size: 18px; cursor: pointer; border-radius: 8px; border: 1px solid #ddd; background: #fff; transition: 0.3s; }
        button:hover { background: #e8f0fe; border-color: #1a73e8; }
        #timer { font-size: 20px; color: red; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="quiz-container">
        <h1>🏆 USTOZ SOVRINI</h1>
        <h3>Matematika fanidan intellektual bellashuv</h3>
        <div id="timer">Vaqt: 60:00</div>
        <hr>
        <div id="quiz-area">
            <p>Yuklanmoqda...</p>
        </div>
    </div>
    </body>
</html>
