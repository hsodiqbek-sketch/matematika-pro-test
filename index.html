<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - USTOZ SOVRINI</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🖼 Test Yuklash</h2>
        <input type="text" id="variant" value="Variant 1">
        <textarea id="questionText" placeholder="Savol matni"></textarea>
        <input type="text" id="imgUrl" placeholder="Rasm linki (URL)">
        <input type="text" id="options" placeholder="Variantlar (A, B, C, D)">
        <input type="text" id="correct" placeholder="To'g'ri javob">
        <button id="sendBtn" onclick="saveToFirebase()">Bazaga Yuborish</button>
    </div>

    <script>
        // DIQQAT: Mana shu konfiguratsiya bazaga ulanishni ta'minlaydi
        const firebaseConfig = {
            databaseURL: "https://matematika-7e82f-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function saveToFirebase() {
            const btn = document.getElementById('sendBtn');
            const data = {
                question: document.getElementById('questionText').value,
                image: document.getElementById('imgUrl').value,
                options: document.getElementById('options').value,
                answer: document.getElementById('correct').value
            };

            if(!data.options || !data.answer) return alert("Variantlar va javobni kiriting!");

            btn.disabled = true;
            btn.innerText = "Yuborilmoqda...";

            // Ma'lumotni bazaga yuborish
            db.ref("tests/Variant_1").push(data)
                .then(() => {
                    alert("Savol muvaffaqiyatli saqlandi!");
                    location.reload(); 
                })
                .catch(e => {
                    alert("Xatolik: " + e.message);
                    btn.disabled = false;
                    btn.innerText = "Qaytadan urinish";
                });
        }
    </script>
</body>
</html>
