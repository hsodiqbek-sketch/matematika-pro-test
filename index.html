<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - USTOZ SOVRINI</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .hint { font-size: 11px; color: #7f8c8d; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🖼 Test Yuklash (Rasmli)</h2>
        <input type="text" id="variant" value="Variant 1">
        <textarea id="questionText" placeholder="Savol matni (ixtiyoriy)"></textarea>
        <input type="text" id="imgUrl" placeholder="Rasm manzili (URL link)">
        <div class="hint">Rasm yo'q bo'lsa, bo'sh qoldiring.</div>
        <input type="text" id="options" placeholder="Variantlar (A, B, C, D)">
        <input type="text" id="correct" placeholder="To'g'ri javob">
        <button id="sendBtn" onclick="saveToFirebase()">Bazaga Yuborish</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://matematika-7e82f-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function saveToFirebase() {
            const btn = document.getElementById('sendBtn');
            const v = document.getElementById('variant').value;
            const data = {
                question: document.getElementById('questionText').value,
                image: document.getElementById('imgUrl').value,
                options: document.getElementById('options').value,
                answer: document.getElementById('correct').value
            };
            if(!data.options || !data.answer) return alert("Variantlar va javobni yozing!");
            btn.disabled = true;
            btn.innerText = "Yuborilmoqda...";
            db.ref("tests/" + v).push(data).then(() => {
                alert("Savol saqlandi!");
                location.reload();
            }).catch(e => alert("Xato: " + e.message));
        }
    </script>
</body>
</html>
